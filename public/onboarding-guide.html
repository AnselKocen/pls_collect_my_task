<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新手指引动画</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f0e8;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }
  .trigger-btn {
    padding: 14px 36px; font-size: 16px;
    background: #222; color: white; border: none; border-radius: 10px;
    cursor: pointer; font-weight: 600;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .trigger-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0);
    display: flex; justify-content: center; align-items: center;
    z-index: 1000; pointer-events: none; transition: background 0.4s;
  }
  .modal-overlay.active {
    background: rgba(0,0,0,0.35); pointer-events: all; backdrop-filter: blur(3px);
  }
  .modal-content {
    background: #faf8f4; border-radius: 20px;
    width: 820px; height: 560px;
    position: relative; overflow: hidden;
    transform: scale(0.85) translateY(30px); opacity: 0;
    transition: all 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.04);
  }
  .modal-overlay.active .modal-content { transform: scale(1) translateY(0); opacity: 1; }
  .close-btn {
    position: absolute; top: 14px; right: 16px;
    background: rgba(0,0,0,0.05); border: none; color: #999;
    font-size: 18px; cursor: pointer; z-index: 10;
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .close-btn:hover { background: rgba(0,0,0,0.1); color: #333; }
  .nav-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(0,0,0,0.06); border: none; color: #888;
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 20px; z-index: 10; transition: all 0.2s;
  }
  .nav-btn:hover:not(:disabled) { background: rgba(0,0,0,0.12); color: #333; }
  .nav-btn:disabled { opacity: 0.2; cursor: default; }
  .nav-prev { left: 16px; }
  .nav-next { right: 16px; }
  .bottom-bar {
    position: absolute; bottom: 18px; left: 0; right: 0;
    display: flex; justify-content: center; z-index: 10;
  }
  .bar-inner { display: flex; align-items: center; gap: 14px; }
  .step-bar { display: flex; gap: 8px; align-items: center; }
  .step-pip {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(0,0,0,0.1); transition: all 0.4s; cursor: pointer;
  }
  .step-pip.on { background: #222; width: 24px; border-radius: 4px; }
  .replay-btn {
    background: none; border: none; color: #bbb; font-size: 17px;
    cursor: pointer; line-height: 1; padding: 2px 4px;
    transition: color 0.2s, transform 0.4s ease;
  }
  .replay-btn:hover { color: #555; transform: rotate(-200deg); }
  @keyframes pulseNext {
    0%, 100% { transform: translateY(-50%) scale(1); background: rgba(0,0,0,0.06); color: #888; }
    50%       { transform: translateY(-50%) scale(1.28); background: rgba(0,0,0,0.13); color: #333; }
  }
  .nav-btn.pulse { animation: pulseNext 1s ease-in-out infinite; }
</style>
</head>
<body>

<button class="trigger-btn" onclick="openGuide()">查看新手指引</button>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeGuide()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <button class="close-btn" onclick="closeGuide()">✕</button>
    <button class="nav-btn nav-prev" id="prevBtn" onclick="goStep(cur-1)" disabled>‹</button>
    <button class="nav-btn nav-next" id="nextBtn" onclick="goStep(cur+1)">›</button>

    <svg viewBox="0 0 820 560" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="gRainbow" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#f9a8d4"/>
          <stop offset="20%"  stop-color="#c4b5fd"/>
          <stop offset="40%"  stop-color="#93c5fd"/>
          <stop offset="60%"  stop-color="#6ee7b7"/>
          <stop offset="80%"  stop-color="#fcd34d"/>
          <stop offset="100%" stop-color="#fca5a5"/>
        </linearGradient>
        <linearGradient id="gGold" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%"   stop-color="#f59e0b"/>
          <stop offset="100%" stop-color="#d97706"/>
        </linearGradient>
        <filter id="cardShadow">
          <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.06)"/>
        </filter>
        <filter id="softShadow">
          <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="rgba(0,0,0,0.04)"/>
        </filter>
      </defs>

      <rect width="820" height="560" fill="#faf8f4"/>
      <text id="title" x="410" y="62" text-anchor="middle" fill="#222" font-size="17" font-weight="700"/>

      <!-- ══════════════════════════════════════════════
           STEP 0 : 上传 → 文件从左侧滑入 → 解析中 → 完毕
           ══════════════════════════════════════════════ -->
      <g id="s0">
        <g id="phaseUpload">
          <!-- 上传框（落地效果由 JS 控制，可重播） -->
          <g id="uploadBoxWrap">
            <rect id="uploadRect" x="230" y="95" width="360" height="230" rx="16"
              fill="white" stroke="#e5e0d8" stroke-width="1.5"
              stroke-dasharray="8 4" filter="url(#cardShadow)"/>
            <!-- 上传图标 -->
            <g transform="translate(410,170)">
              <rect x="-18" y="-5" width="36" height="6" rx="2" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
              <path d="M-18,1 L-18,14 Q-18,20 -12,20 L12,20 Q18,20 18,14 L18,1" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
              <line x1="0" y1="-8" x2="0" y2="-26" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
              <polyline points="-8,-18 0,-26 8,-18" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </g>
            <text x="410" y="225" text-anchor="middle" fill="#222" font-size="14" font-weight="700">点击或拖拽文件到这里上传</text>
            <text x="410" y="247" text-anchor="middle" fill="#999" font-size="11">支持 PDF、EPUB、Markdown 文件，单个文件最大 100MB</text>
            <g transform="translate(410,275)">
              <rect x="-50" y="-13" width="44" height="26" rx="13" fill="#222"/>
              <text x="-28" y="4" text-anchor="middle" fill="white" font-size="10" font-weight="600">● 中文</text>
              <rect x="6"  y="-13" width="44" height="26" rx="13" fill="#f0ede6"/>
              <text x="28" y="4" text-anchor="middle" fill="#666" font-size="10">○ 英文</text>
            </g>
          </g>

          <!-- 文件（初始在屏外，位置和动画完全由 JS 控制） -->
          <g id="uploadFile" opacity="0" transform="translate(-65,208)">
            <rect x="-28" y="-38" width="56" height="72" rx="8"
              fill="white" stroke="#bdc3cc" stroke-width="2" filter="url(#cardShadow)"/>
            <line x1="-16" y1="-14" x2="14" y2="-14" stroke="#dde1e7" stroke-width="2"/>
            <line x1="-16" y1="-2"  x2="16" y2="-2"  stroke="#dde1e7" stroke-width="2"/>
            <line x1="-16" y1="10"  x2="8"  y2="10"  stroke="#dde1e7" stroke-width="2"/>
            <rect x="-14" y="20" width="28" height="14" rx="4" fill="#ef4444" opacity="0.92"/>
            <text x="0" y="30" text-anchor="middle" fill="white" font-size="9" font-weight="700">PDF</text>
          </g>
        </g>

        <!-- Phase B: 解析中 -->
        <g id="phaseParsing" opacity="0">
          <g transform="translate(410,220)">
            <circle r="58" fill="none" stroke="#eee" stroke-width="3"/>
            <circle r="58" fill="none" stroke="#222" stroke-width="3"
              stroke-dasharray="92 272" stroke-linecap="round">
              <animateTransform attributeName="transform" type="rotate"
                values="0;360" dur="1s" repeatCount="indefinite"/>
            </circle>
            <text x="0" y="6" text-anchor="middle" fill="#222" font-size="18" font-weight="700">提炼中</text>
          </g>
          <text x="410" y="318" text-anchor="middle" fill="#bbb" font-size="13">正在从文档中提炼知识结构…</text>
        </g>

        <!-- Phase C: 解析完毕 -->
        <g id="parseDone" opacity="0">
          <g transform="translate(410,220)">
            <circle r="58" fill="none" stroke="#22c55e" stroke-width="3"/>
            <polyline points="-20,2 -6,18 22,-14"
              fill="none" stroke="#22c55e" stroke-width="4.5"
              stroke-linecap="round" stroke-linejoin="round"/>
          </g>
          <text x="410" y="320" text-anchor="middle" fill="#222" font-size="18" font-weight="700">提炼完成！</text>
          <text x="410" y="350" text-anchor="middle" fill="#999" font-size="15">点右边，去看看你的 Skills →</text>
        </g>
      </g>

      <!-- ══════════════════════════════════════════════
           STEP 1 : 光标点击 My Space → Skills 卡片显现
           ══════════════════════════════════════════════ -->
      <g id="s1" opacity="0">
        <!-- My Space 标题（始终可见，光标点击目标） -->
        <text x="110" y="118" fill="#222" font-size="15" font-weight="800">My Space</text>

        <!-- 光标 -->
        <g id="s1Cursor" opacity="0">
          <polygon points="0,0 0,22 6,16 11,27 14,25 9,14 16,14"
            fill="#1a1a1a" stroke="white" stroke-width="2.5"
            stroke-linejoin="round" stroke-linecap="round"/>
          <circle id="s1Ripple" r="0" cx="7" cy="11"
            fill="none" stroke="rgba(0,0,0,0.22)" stroke-width="1.8" opacity="0"/>
        </g>

        <!-- 点击后显现的内容 -->
        <g id="s1Content" opacity="0" style="pointer-events:none">
          <g transform="translate(110,131)">
            <rect x="0"  y="0" width="68" height="26" rx="13" fill="#222"/>
            <text x="34" y="17" text-anchor="middle" fill="white" font-size="10" font-weight="600">我的技能</text>
            <rect x="76" y="0" width="68" height="26" rx="13" fill="#f0ede6"/>
            <text x="110" y="17" text-anchor="middle" fill="#666" font-size="10">我的应用</text>
          </g>
          <!-- 5 skill cards -->
          <g transform="translate(144,230)">
            <rect x="-54" y="-36" width="108" height="72" rx="10" fill="white" stroke="#eee" stroke-width="1" filter="url(#cardShadow)"/>
            <text x="-40" y="-14" fill="#222" font-size="10" font-weight="700">韩愈传.md</text>
            <text x="-40" y="0"   fill="#aaa" font-size="7.5">2026/3/29 · skills: 14</text>
            <circle cx="-34" cy="16" r="3" fill="#22c55e"/>
            <text x="-24" y="19" fill="#22c55e" font-size="8" font-weight="600">成功</text>
          </g>
          <g transform="translate(277,230)">
            <rect x="-54" y="-36" width="108" height="72" rx="10" fill="white" stroke="#eee" stroke-width="1" filter="url(#cardShadow)"/>
            <text x="-40" y="-14" fill="#222" font-size="10" font-weight="700">游戏技巧.md</text>
            <text x="-40" y="0"   fill="#aaa" font-size="7.5">2026/3/29 · skills: 11</text>
            <circle cx="-34" cy="16" r="3" fill="#22c55e"/>
            <text x="-24" y="19" fill="#22c55e" font-size="8" font-weight="600">成功</text>
          </g>
          <g transform="translate(410,230)">
            <rect x="-54" y="-36" width="108" height="72" rx="10" fill="white" stroke="#eee" stroke-width="1" filter="url(#cardShadow)"/>
            <text x="-40" y="-14" fill="#222" font-size="10" font-weight="700">观云手册.md</text>
            <text x="-40" y="0"   fill="#aaa" font-size="7.5">2026/3/29 · skills: 14</text>
            <circle cx="-34" cy="16" r="3" fill="#22c55e"/>
            <text x="-24" y="19" fill="#22c55e" font-size="8" font-weight="600">成功</text>
          </g>
          <g transform="translate(543,230)">
            <rect x="-54" y="-36" width="108" height="72" rx="10" fill="white" stroke="#eee" stroke-width="1" filter="url(#cardShadow)"/>
            <text x="-40" y="-14" fill="#222" font-size="10" font-weight="700">财报分析.md</text>
            <text x="-40" y="0"   fill="#aaa" font-size="7.5">2026/3/29 · skills: 4</text>
            <circle cx="-34" cy="16" r="3" fill="#22c55e"/>
            <text x="-24" y="19" fill="#22c55e" font-size="8" font-weight="600">成功</text>
          </g>
          <g transform="translate(676,230)">
            <rect x="-54" y="-36" width="108" height="72" rx="10" fill="white" stroke="#eee" stroke-width="1" filter="url(#cardShadow)"/>
            <text x="-40" y="-14" fill="#222" font-size="10" font-weight="700">诡计大全.md</text>
            <text x="-40" y="0"   fill="#aaa" font-size="7.5">2026/2/21 · skills: 40</text>
            <circle cx="-34" cy="16" r="3" fill="#22c55e"/>
            <text x="-24" y="19" fill="#22c55e" font-size="8" font-weight="600">成功</text>
          </g>
          <!-- 提示 18px -->
          <text x="410" y="332" text-anchor="middle" fill="#999" font-size="18" font-weight="500">这就是从你文档里提炼出的 Skills，可以下载，也可以直接构建专属 App。</text>
          <!-- 按钮 -->
          <g transform="translate(410,394)">
            <g transform="translate(-95,0)">
              <rect x="-58" y="-22" width="116" height="44" rx="22" fill="white" stroke="#e5e0d8" stroke-width="1.5"/>
              <g transform="translate(-28,-1)">
                <rect x="-7" y="-4" width="14" height="3" rx="1" fill="none" stroke="#333" stroke-width="1.5"/>
                <path d="M-7,-1 L-7,6 Q-7,9 -4,9 L4,9 Q7,9 7,6 L7,-1" fill="none" stroke="#333" stroke-width="1.5"/>
                <line x1="0" y1="-4" x2="0" y2="-12" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
                <polyline points="-4,-7 0,-4 4,-7" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </g>
              <text x="4" y="5" text-anchor="middle" fill="#333" font-size="14" font-weight="600">下载</text>
            </g>
            <g transform="translate(95,0)" style="cursor:pointer" onclick="goStep(2)">
              <rect x="-68" y="-24" width="136" height="48" rx="24" fill="url(#gRainbow)" opacity="0.35"/>
              <rect x="-64" y="-22" width="128" height="44" rx="22" fill="white" stroke="url(#gRainbow)" stroke-width="2"/>
              <g transform="translate(-28,-1)">
                <line x1="0" y1="6" x2="0" y2="-2" stroke="#333" stroke-width="2" stroke-linecap="round"/>
                <rect x="-5" y="-8" width="10" height="7" rx="2" fill="#333"/>
              </g>
              <text x="6" y="5" text-anchor="middle" fill="#222" font-size="14" font-weight="700">构建应用</text>
            </g>
          </g>
        </g>
      </g>

      <!-- ══════════════════════════════════════════════
           STEP 2 : 选择模版 → 构建中 → 完成 🎉
           ══════════════════════════════════════════════ -->
      <g id="s2" opacity="0">

        <!-- Phase T: 选择模版 -->
        <g id="phaseTemplates">
          <text x="38" y="88" fill="#222" font-size="12.5" font-weight="600">挑一个适合你内容的模版，改起来也很容易</text>

          <!-- Template Card 1 -->
          <g class="t-card" onclick="startBuilding()" style="cursor:pointer"
             onmouseover="this.querySelector('rect').setAttribute('fill','#f5f2ec')"
             onmouseout="this.querySelector('rect').setAttribute('fill','white')">
            <rect x="38" y="100" width="173" height="118" rx="10"
              fill="white" stroke="#ece8e0" stroke-width="1" filter="url(#softShadow)"/>
            <text x="52" y="124" fill="#222" font-size="11" font-weight="700">身临其境</text>
            <text x="52" y="138" fill="#222" font-size="11" font-weight="700">推理小说模版</text>
            <text x="52" y="157" fill="#888" font-size="9.5">成为书中侦探，仿真</text>
            <text x="52" y="170" fill="#888" font-size="9.5">探案解开谜题</text>
          </g>

          <!-- Template Card 2 -->
          <g class="t-card" onclick="startBuilding()" style="cursor:pointer"
             onmouseover="this.querySelector('rect').setAttribute('fill','#f5f2ec')"
             onmouseout="this.querySelector('rect').setAttribute('fill','white')">
            <rect x="221" y="100" width="173" height="118" rx="10"
              fill="white" stroke="#ece8e0" stroke-width="1" filter="url(#softShadow)"/>
            <text x="235" y="124" fill="#222" font-size="11" font-weight="700">体验ta的一生</text>
            <text x="235" y="138" fill="#222" font-size="11" font-weight="700">(古风人物)</text>
            <text x="235" y="157" fill="#888" font-size="9.5">适用于历史人物传记</text>
            <text x="235" y="170" fill="#888" font-size="9.5">沉浸式体验人物一生</text>
          </g>

          <!-- Template Card 3 -->
          <g class="t-card" onclick="startBuilding()" style="cursor:pointer"
             onmouseover="this.querySelector('rect').setAttribute('fill','#f5f2ec')"
             onmouseout="this.querySelector('rect').setAttribute('fill','white')">
            <rect x="404" y="100" width="173" height="118" rx="10"
              fill="white" stroke="#ece8e0" stroke-width="1" filter="url(#softShadow)"/>
            <text x="418" y="124" fill="#222" font-size="11" font-weight="700">文档审核背锅侠</text>
            <text x="418" y="148" fill="#888" font-size="9.5">自动对照规范审查</text>
            <text x="418" y="161" fill="#888" font-size="9.5">文档，快速定位问题</text>
          </g>

          <!-- Template Card 4 -->
          <g class="t-card" onclick="startBuilding()" style="cursor:pointer"
             onmouseover="this.querySelector('rect').setAttribute('fill','#f5f2ec')"
             onmouseout="this.querySelector('rect').setAttribute('fill','white')">
            <rect id="card4Rect" x="587" y="100" width="173" height="118" rx="10"
              fill="white" stroke="#ece8e0" stroke-width="1" filter="url(#softShadow)"/>
            <text x="601" y="124" fill="#222" font-size="11" font-weight="700">快把游戏端上来吧</text>
            <text x="601" y="148" fill="#888" font-size="9.5">极速生成可玩的小</text>
            <text x="601" y="161" fill="#888" font-size="9.5">游戏原型，即刻体验</text>
          </g>

          <!-- 分隔 -->
          <text x="38" y="242" fill="#c0bab2" font-size="11">或者，直接描述你想要的 ——</text>

          <!-- 输入框 -->
          <rect x="38" y="257" width="744" height="152" rx="14"
            fill="white" stroke="#e5e0d8" stroke-width="1.5"/>
          <text x="58" y="290" fill="#ccc" font-size="13">比如：帮我做一个角色扮演游戏，或者根据财报生成每日播报…</text>

          <!-- 发送按钮 -->
          <g onclick="startBuilding()" style="cursor:pointer">
            <circle cx="764" cy="387" r="20" fill="#888"/>
            <text x="764" y="394" text-anchor="middle" fill="white" font-size="18" font-weight="300">↑</text>
          </g>

          <!-- 演示光标（JS 控制） -->
          <g id="s2Cursor" opacity="0" transform="translate(350,260)">
            <polygon points="0,0 0,22 6,16 11,27 14,25 9,14 16,14"
              fill="#1a1a1a" stroke="white" stroke-width="2.5"
              stroke-linejoin="round" stroke-linecap="round"/>
            <circle id="s2Ripple" r="0" cx="7" cy="11"
              fill="none" stroke="rgba(0,0,0,0.22)" stroke-width="1.8" opacity="0"/>
          </g>
        </g>

        <!-- Phase B: 构建中 spinner -->
        <g id="phaseBuilding" opacity="0">
          <g transform="translate(410,248)">
            <circle r="60" fill="none" stroke="#eee" stroke-width="3"/>
            <circle r="60" fill="none" stroke="url(#gRainbow)" stroke-width="3"
              stroke-dasharray="95 282" stroke-linecap="round">
              <animateTransform attributeName="transform" type="rotate"
                values="0;360" dur="1.1s" repeatCount="indefinite"/>
            </circle>
            <circle r="42" fill="none" stroke="url(#gRainbow)" stroke-width="2"
              stroke-dasharray="8 12" opacity="0.35">
              <animateTransform attributeName="transform" type="rotate"
                values="360;0" dur="2s" repeatCount="indefinite"/>
            </circle>
            <circle r="26" fill="white" stroke="url(#gRainbow)" stroke-width="2.5" filter="url(#cardShadow)">
              <animate attributeName="r" values="26;29;26" dur="1.4s" repeatCount="indefinite"/>
            </circle>
            <text x="0" y="5" text-anchor="middle" fill="#222" font-size="12" font-weight="700">构建中…</text>
          </g>
          <!-- sparks -->
          <circle cx="410" cy="248" r="2.2" fill="#fcd34d" opacity="0">
            <animate attributeName="cx" values="410;356;330" dur=".85s" repeatCount="indefinite"/>
            <animate attributeName="cy" values="248;200;182" dur=".85s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0;.8;0"  dur=".85s" repeatCount="indefinite"/>
          </circle>
          <circle cx="410" cy="248" r="2" fill="#f9a8d4" opacity="0">
            <animate attributeName="cx" values="410;464;490" dur=".95s" begin=".2s" repeatCount="indefinite"/>
            <animate attributeName="cy" values="248;200;185" dur=".95s" begin=".2s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0;.7;0"  dur=".95s" begin=".2s" repeatCount="indefinite"/>
          </circle>
          <circle cx="410" cy="248" r="2" fill="#93c5fd" opacity="0">
            <animate attributeName="cx" values="410;372;348" dur=".75s" begin=".4s" repeatCount="indefinite"/>
            <animate attributeName="cy" values="248;296;312" dur=".75s" begin=".4s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0;.6;0"  dur=".75s" begin=".4s" repeatCount="indefinite"/>
          </circle>
        </g>

        <!-- Phase D: 完成 🎉 -->
        <g id="phaseDone" opacity="0">
          <!-- 🎉 单个居中彩蛋 -->
          <g id="confetti1" transform="translate(410,230) scale(0)" opacity="0">
            <text x="0" y="0" text-anchor="middle" font-size="40">🎉</text>
          </g>

          <!-- App 卡片 — 4张居中 (x: 140 320 500 680, 间距180) -->
          <g id="appC1" transform="translate(140,330) scale(0)" opacity="0">
            <rect x="-60" y="-45" width="120" height="90" rx="12" fill="white" stroke="#eee" stroke-width="1" filter="url(#cardShadow)"/>
            <text x="0" y="-18" text-anchor="middle" font-size="24">🎮</text>
            <text x="0" y="4"   text-anchor="middle" fill="#222" font-size="12" font-weight="700">推理游戏</text>
            <text x="0" y="18"  text-anchor="middle" fill="#aaa" font-size="8">沉浸式互动剧情</text>
            <rect x="-30" y="24" width="60" height="20" rx="10" fill="#222"/>
            <text x="0" y="37" text-anchor="middle" fill="white" font-size="8" font-weight="600">打开 →</text>
          </g>
          <g id="appC2" transform="translate(320,330) scale(0)" opacity="0">
            <rect x="-60" y="-45" width="120" height="90" rx="12" fill="white" stroke="#eee" stroke-width="1" filter="url(#cardShadow)"/>
            <text x="0" y="-18" text-anchor="middle" font-size="24">🏠</text>
            <text x="0" y="4"   text-anchor="middle" fill="#222" font-size="12" font-weight="700">模拟人生</text>
            <text x="0" y="18"  text-anchor="middle" fill="#aaa" font-size="8">角色扮演模拟器</text>
            <rect x="-30" y="24" width="60" height="20" rx="10" fill="#222"/>
            <text x="0" y="37" text-anchor="middle" fill="white" font-size="8" font-weight="600">打开 →</text>
          </g>
          <g id="appC3" transform="translate(500,330) scale(0)" opacity="0">
            <rect x="-60" y="-45" width="120" height="90" rx="12" fill="white" stroke="#eee" stroke-width="1" filter="url(#cardShadow)"/>
            <text x="0" y="-18" text-anchor="middle" font-size="24">📊</text>
            <text x="0" y="4"   text-anchor="middle" fill="#222" font-size="12" font-weight="700">财报分析</text>
            <text x="0" y="18"  text-anchor="middle" fill="#aaa" font-size="8">智能财务解读</text>
            <rect x="-30" y="24" width="60" height="20" rx="10" fill="#222"/>
            <text x="0" y="37" text-anchor="middle" fill="white" font-size="8" font-weight="600">打开 →</text>
          </g>
          <g id="appC4" transform="translate(680,330) scale(0)" opacity="0">
            <rect x="-60" y="-45" width="120" height="90" rx="12" fill="white" stroke="#eee" stroke-width="1" filter="url(#cardShadow)"/>
            <text x="0" y="-18" text-anchor="middle" font-size="24">📚</text>
            <text x="0" y="4"   text-anchor="middle" fill="#222" font-size="12" font-weight="700">图鉴收集</text>
            <text x="0" y="18"  text-anchor="middle" fill="#aaa" font-size="8">百科知识图鉴</text>
            <rect x="-30" y="24" width="60" height="20" rx="10" fill="#222"/>
            <text x="0" y="37" text-anchor="middle" fill="white" font-size="8" font-weight="600">打开 →</text>
          </g>

          <!-- 提示文字 -->
          <text x="410" y="415" text-anchor="middle" fill="#888" font-size="15" font-weight="500">等待app构建完毕后，你可以分享给任何人游玩！</text>
          <text x="410" y="442" text-anchor="middle" fill="#aaa" font-size="15">
            <tspan>快来试试吧～ 👉🏻 </tspan><a href="https://pdf2app.cn/home" target="_blank"><tspan fill="#555" text-decoration="underline" style="cursor:pointer">pdf2skills.com</tspan></a>
          </text>
        </g>
      </g>
    </svg>

    <div class="bottom-bar">
      <div class="bar-inner">
        <div class="step-bar" id="dots"></div>
        <button class="replay-btn" onclick="replayGuide()" title="重新播放">↺</button>
      </div>
    </div>
  </div>
</div>

<script>
const TITLES = ['上传内容，提炼你的 Skills', '你的 Skills 已就绪', '选一个起点，生成你的 App'];
const TOTAL = 3;
let cur = 0, appTimer = null, s0Timer = null, s1Timer = null, s2Timer = null;

function $(id) { return document.getElementById(id); }

/* ══ Step 0 ══ */
function resetStep0Phases() {
  $('phaseUpload').setAttribute('opacity', '1');
  $('phaseParsing').setAttribute('opacity', '0');
  $('parseDone').setAttribute('opacity', '0');
  // 重置文件到屏外起始位置
  const file = $('uploadFile');
  file.setAttribute('opacity', '0');
  file.setAttribute('transform', 'translate(-65,208)');
  // 重置上传框边框
  const rect = $('uploadRect');
  rect.setAttribute('stroke', '#e5e0d8');
  rect.setAttribute('stroke-width', '1.5');
  rect.setAttribute('stroke-dasharray', '8 4');
  // 重置 box 位移
  $('uploadBoxWrap').setAttribute('transform', '');
}

function animateFileIn() {
  const file = $('uploadFile');
  const rect = $('uploadRect');
  const wrap = $('uploadBoxWrap');
  const startX = -65, endX = 410, y = 208;
  const dur = 1900; // 慢 0.5s
  const t0 = performance.now();
  file.setAttribute('opacity', '1');

  (function slide(now) {
    const p = Math.min((now - t0) / dur, 1);
    // easeOutBack：末尾轻微 overshoot 再回弹
    const c1 = 1.4, c3 = c1 + 1;
    const e = p < 1
      ? 1 + c3 * Math.pow(p - 1, 3) + c1 * Math.pow(p - 1, 2)
      : 1;
    const x = startX + (endX - startX) * Math.min(Math.max(e, 0), 1.06);
    file.setAttribute('transform', `translate(${x},${y})`);
    if (p < 1) { requestAnimationFrame(slide); return; }

    // 落地：绿边闪烁 + 轻弹
    flashBorder(rect);
    bounceLanding(wrap);
    // 文件渐隐
    setTimeout(() => fadeEl(file, 400), 500);
  })(t0);
}

function flashBorder(rect) {
  const t0 = performance.now(), dur = 720;
  (function f(now) {
    const p = Math.min((now - t0) / dur, 1);
    if (p < 0.5) {
      rect.setAttribute('stroke', '#4ade80');
      rect.setAttribute('stroke-width', '2.5');
      rect.setAttribute('stroke-dasharray', '0');
    } else {
      rect.setAttribute('stroke', '#e5e0d8');
      rect.setAttribute('stroke-width', '1.5');
      rect.setAttribute('stroke-dasharray', '8 4');
    }
    if (p < 1) requestAnimationFrame(f);
  })(t0);
}

function bounceLanding(wrap) {
  const t0 = performance.now(), dur = 430;
  (function b(now) {
    const p = Math.min((now - t0) / dur, 1);
    const dy = p < 0.28 ? -2.8 * (p / 0.28)
             : p < 0.62 ? -2.8 + 4 * ((p - 0.28) / 0.34)
             : p < 0.85 ? 1.2 - 1.2 * ((p - 0.62) / 0.23)
             : 0;
    wrap.setAttribute('transform', `translate(0,${dy.toFixed(2)})`);
    if (p < 1) requestAnimationFrame(b);
    else wrap.setAttribute('transform', '');
  })(t0);
}

function fadeEl(el, dur) {
  const t0 = performance.now();
  (function f(now) {
    const p = Math.min((now - t0) / dur, 1);
    el.setAttribute('opacity', (1 - p).toString());
    if (p < 1) requestAnimationFrame(f);
  })(t0);
}

function startStep0Animation() {
  resetStep0Phases();
  if (s0Timer) { clearTimeout(s0Timer); s0Timer = null; }
  // 文件飞入动画（纯 JS，可重复触发）
  animateFileIn();
  // 2.5s 后切换到提炼中（含文件 1.9s + 短暂停顿）
  s0Timer = setTimeout(() => {
    $('phaseUpload').setAttribute('opacity', '0');
    $('phaseParsing').setAttribute('opacity', '1');
    // 转圈慢 0.5s → 2.5s
    s0Timer = setTimeout(() => {
      $('phaseParsing').setAttribute('opacity', '0');
      $('parseDone').setAttribute('opacity', '1');
      startNextPulse(); // 提示用户点 ›
    }, 2500);
  }, 2500);
}

/* ══ Step 1 cursor ══ */
function resetS1() {
  if (s1Timer) { clearTimeout(s1Timer); s1Timer = null; }
  $('s1Cursor').setAttribute('opacity', '0');
  $('s1Cursor').setAttribute('transform', 'translate(520,68)');
  $('s1Content').setAttribute('opacity', '0');
  $('s1Content').style.pointerEvents = 'none';
}

function animateS1Cursor() {
  resetS1();
  const cursor = $('s1Cursor'), content = $('s1Content'), ripple = $('s1Ripple');
  s1Timer = setTimeout(() => {
    cursor.setAttribute('opacity', '1');
    const sx = 520, sy = 68, ex = 152, ey = 108;
    const t0 = performance.now(), dur = 780;
    (function move(now) {
      const p = Math.min((now - t0) / dur, 1);
      const e = 1 - Math.pow(1 - p, 3);
      cursor.setAttribute('transform', `translate(${sx+(ex-sx)*e},${sy+(ey-sy)*e})`);
      if (p < 1) { requestAnimationFrame(move); return; }
      cursor.setAttribute('transform', `translate(${ex},${ey}) scale(0.76)`);
      s1Timer = setTimeout(() => {
        cursor.setAttribute('transform', `translate(${ex},${ey}) scale(1)`);
        const rStart = performance.now();
        ripple.setAttribute('r', '0'); ripple.setAttribute('opacity', '0.45');
        (function rAnim(now) {
          const p = Math.min((now - rStart) / 340, 1);
          ripple.setAttribute('r', (p*24).toString());
          ripple.setAttribute('opacity', ((1-p)*0.45).toString());
          if (p < 1) requestAnimationFrame(rAnim);
        })(rStart);
        s1Timer = setTimeout(() => {
          content.setAttribute('opacity', '1');
          content.style.pointerEvents = '';
          startNextPulse(); // 提示用户点 ›
          s1Timer = setTimeout(() => cursor.setAttribute('opacity', '0'), 380);
        }, 260);
      }, 135);
    })(t0);
  }, 280);
}

/* ══ Step 2 phases ══ */
function resetConfetti() {
  const el = $('confetti1');
  const m = el.getAttribute('transform').match(/translate\(([^,]+),\s*([^)]+)\)/);
  if (m) el.setAttribute('transform', `translate(${m[1]},${m[2]}) scale(0)`);
  el.setAttribute('opacity', '0');
}

function resetS2Demo() {
  if (s2Timer) { clearTimeout(s2Timer); s2Timer = null; }
  $('s2Cursor').setAttribute('opacity', '0');
  $('s2Cursor').setAttribute('transform', 'translate(350,260)');
  const c4 = $('card4Rect');
  c4.setAttribute('fill', 'white');
  c4.setAttribute('stroke', '#ece8e0');
  c4.setAttribute('stroke-width', '1');
}

function resetS2Phases() {
  if (appTimer) { clearTimeout(appTimer); appTimer = null; }
  resetS2Demo();
  $('phaseTemplates').setAttribute('opacity', '1');
  $('phaseTemplates').style.transition = '';
  $('phaseBuilding').setAttribute('opacity', '0');
  $('phaseBuilding').style.transition = '';
  $('phaseDone').setAttribute('opacity', '0');
  resetAppCards();
  resetConfetti();
}

/* ══ Step 3 cursor demo ══ */
function animCursor(cursor, sx, sy, ex, ey, dur, cb) {
  const t0 = performance.now();
  (function f(now) {
    const p = Math.min((now - t0) / dur, 1);
    const e = 1 - Math.pow(1 - p, 3);
    cursor.setAttribute('transform', `translate(${sx+(ex-sx)*e},${sy+(ey-sy)*e})`);
    if (p < 1) requestAnimationFrame(f); else cb();
  })(t0);
}

function animRippleEl(ripple) {
  const t0 = performance.now();
  ripple.setAttribute('r', '0'); ripple.setAttribute('opacity', '0.4');
  (function f(now) {
    const p = Math.min((now - t0) / 380, 1);
    ripple.setAttribute('r', (p*22).toString());
    ripple.setAttribute('opacity', ((1-p)*0.4).toString());
    if (p < 1) requestAnimationFrame(f);
  })(t0);
}

function animateS2Demo() {
  const cursor = $('s2Cursor');
  const ripple = $('s2Ripple');
  cursor.setAttribute('opacity', '1');

  // 1: 移向卡片4 中心 (673, 155)
  animCursor(cursor, 350, 260, 673, 155, 900, () => {
    cursor.setAttribute('transform', 'translate(673,155) scale(0.76)');
    s2Timer = setTimeout(() => {
      cursor.setAttribute('transform', 'translate(673,155) scale(1)');
      animRippleEl(ripple);
      // 高亮卡片4
      const c4 = $('card4Rect');
      c4.setAttribute('stroke', '#333');
      c4.setAttribute('stroke-width', '2');
      c4.setAttribute('fill', '#f0ede6');

      // 2: 移向发送按钮 (764, 378)
      s2Timer = setTimeout(() => {
        animCursor(cursor, 673, 155, 764, 378, 750, () => {
          cursor.setAttribute('transform', 'translate(764,378) scale(0.76)');
          s2Timer = setTimeout(() => {
            cursor.setAttribute('opacity', '0');
            startBuilding();
          }, 150);
        });
      }, 600);
    }, 140);
  });
}

function startBuilding() {
  if (appTimer) return; // 防止重复点击
  $('phaseTemplates').style.transition = 'opacity 0.3s';
  $('phaseTemplates').setAttribute('opacity', '0');
  setTimeout(() => {
    $('phaseBuilding').style.transition = 'opacity 0.3s';
    $('phaseBuilding').setAttribute('opacity', '1');
  }, 180);
  appTimer = setTimeout(() => {
    appTimer = null;
    $('phaseBuilding').style.transition = 'opacity 0.5s';
    $('phaseBuilding').setAttribute('opacity', '0');
    setTimeout(() => {
      $('phaseDone').setAttribute('opacity', '1');
      // 🎉 先弹出
      popIn($('confetti1'), 0, 600);
      // app 卡片依次弹出
      popIn($('appC1'), 160, 460);
      popIn($('appC2'), 280, 460);
      popIn($('appC3'), 400, 460);
      popIn($('appC4'), 520, 460);
    }, 350);
  }, 2300);
}

/* ══ Elastic pop ══ */
function popIn(el, delay, dur) {
  setTimeout(() => {
    el.setAttribute('opacity', '1');
    const m = el.getAttribute('transform').match(/translate\(([^,]+),\s*([^)]+)\)/);
    const tx = m ? m[1] : '0', ty = m ? m[2] : '0';
    const t0 = performance.now();
    (function tick(now) {
      const p = Math.min((now - t0) / dur, 1);
      const e = p === 0 || p === 1 ? p
        : Math.pow(2, -10*p) * Math.sin((p-0.075)*2*Math.PI/0.3) + 1;
      el.setAttribute('transform', `translate(${tx},${ty}) scale(${e})`);
      if (p < 1) requestAnimationFrame(tick);
    })(t0);
  }, delay);
}

function resetAppCards() {
  ['appC1','appC2','appC3','appC4'].forEach(id => {
    const el = $(id);
    const m = el.getAttribute('transform').match(/translate\(([^,]+),\s*([^)]+)\)/);
    if (m) el.setAttribute('transform', `translate(${m[1]},${m[2]}) scale(0)`);
    el.setAttribute('opacity', '0');
  });
}

/* ══ Next button pulse hint ══ */
function startNextPulse() { $('nextBtn').classList.add('pulse'); }
function stopNextPulse()  { $('nextBtn').classList.remove('pulse'); }

/* ══ Navigation ══ */
function goStep(n) {
  if (n < 0 || n >= TOTAL) return;
  stopNextPulse();
  if (appTimer) { clearTimeout(appTimer); appTimer = null; }
  if (s0Timer)  { clearTimeout(s0Timer);  s0Timer = null; }
  if (s1Timer)  { clearTimeout(s1Timer);  s1Timer = null; }
  if (s2Timer)  { clearTimeout(s2Timer);  s2Timer = null; }

  const oldEl = $('s' + cur);
  if (oldEl) { oldEl.style.transition = 'opacity 0.35s'; oldEl.setAttribute('opacity', '0'); }
  cur = n;

  setTimeout(() => {
    const newEl = $('s' + cur);
    if (newEl) { newEl.style.transition = 'opacity 0.35s'; newEl.setAttribute('opacity', '1'); }
    if (cur === 0) startStep0Animation();
    if (cur === 1) animateS1Cursor();
    if (cur === 2) {
      resetS2Phases();                          // 重置模板选择界面
      s2Timer = setTimeout(animateS2Demo, 500); // 自动演示光标点击
    }
  }, 200);

  $('title').textContent = TITLES[cur];
  $('prevBtn').disabled = cur === 0;
  $('nextBtn').disabled = cur === TOTAL - 1;
  document.querySelectorAll('.step-pip').forEach((d, i) => d.classList.toggle('on', i === cur));
}

function openGuide() {
  const dotsEl = $('dots');
  dotsEl.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const d = document.createElement('div');
    d.className = 'step-pip' + (i === 0 ? ' on' : '');
    d.onclick = () => goStep(i);
    dotsEl.appendChild(d);
  }
  for (let i = 0; i < TOTAL; i++) {
    $('s' + i).setAttribute('opacity', i === 0 ? '1' : '0');
    $('s' + i).style.transition = '';
  }
  resetS1();
  resetS2Phases();
  cur = 0;
  $('title').textContent = TITLES[0];
  $('prevBtn').disabled = true;
  $('nextBtn').disabled = false;
  $('modal').classList.add('active');
  startStep0Animation();
}

function replayGuide() {
  stopNextPulse();
  if (appTimer) { clearTimeout(appTimer); appTimer = null; }
  if (s0Timer)  { clearTimeout(s0Timer);  s0Timer = null; }
  if (s1Timer)  { clearTimeout(s1Timer);  s1Timer = null; }
  if (s2Timer)  { clearTimeout(s2Timer);  s2Timer = null; }
  for (let i = 0; i < TOTAL; i++) {
    $('s' + i).style.transition = '';
    $('s' + i).setAttribute('opacity', i === 0 ? '1' : '0');
  }
  resetS1();
  resetS2Phases();
  cur = 0;
  $('title').textContent = TITLES[0];
  $('prevBtn').disabled = true;
  $('nextBtn').disabled = false;
  document.querySelectorAll('.step-pip').forEach((d, i) => d.classList.toggle('on', i === 0));
  startStep0Animation();
}

function closeGuide() {
  stopNextPulse();
  $('modal').classList.remove('active');
  if (appTimer) clearTimeout(appTimer);
  if (s0Timer)  clearTimeout(s0Timer);
  if (s1Timer)  clearTimeout(s1Timer);
  if (s2Timer)  clearTimeout(s2Timer);
}

document.addEventListener('keydown', e => {
  if (!$('modal').classList.contains('active')) return;
  if (e.key === 'ArrowLeft')  goStep(cur - 1);
  else if (e.key === 'ArrowRight') goStep(cur + 1);
  else if (e.key === 'Escape') closeGuide();
});
</script>
</body>
